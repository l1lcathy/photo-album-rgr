<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Альбомы</title>

    <style>

        body{
            font-family:Arial;
            background:#f3f4f6;
            padding:30px;
        }

        h1{
            margin-bottom:30px;
        }

        .album{
            background:white;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        button{
            padding:10px 16px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

    </style>
</head>
<body>

<h1>Мои альбомы</h1>

<div class="album">
    <h2>Отпуск 2026</h2>
    <p>Фотографии с отдыха</p>

    <button>Открыть</button>
</div>

<div class="album">
    <h2>Семья</h2>
    <p>Семейные фотографии</p>

    <button>Открыть</button>
</div>

</body>
</html>
