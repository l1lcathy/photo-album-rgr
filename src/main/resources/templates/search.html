<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поиск - Фотоальбом</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f3f4f6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
        }
        .nav a:hover {
            background: #34495e;
            border-radius: 5px;
        }
        .search-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .search-box input {
            width: 70%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .search-box button {
            padding: 12px 24px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .search-box button:hover {
            background: #2980b9;
        }
        .popular-tags {
            margin-top: 15px;
        }
        .tag {
            display: inline-block;
            background: #e0e0e0;
            padding: 6px 14px;
            margin: 5px;
            border-radius: 20px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }
        .tag:hover {
            background: #3498db;
            color: white;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .photo-info {
            padding: 12px;
        }
        .photo-info h4 {
            margin: 0 0 5px 0;
        }
        .photo-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 6px 12px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 12px;
        }
        .empty {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 12px;
        }
        .search-title {
            margin-bottom: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Поиск фотографий</h1>
            <div class="nav">
                <a href="/">Главная</a>
                <a href="/albums">Мои альбомы</a>
                <a href="/photos/gallery">Галерея</a>
                <a href="/logout">Выйти</a>
            </div>
        </div>

        <div class="search-box">
            <form method="get" action="/search">
                <input type="text" name="tag" placeholder="Поиск по тегу..." th:value="${currentTag}">
                <button type="submit">🔍 Найти</button>
            </form>
            
            <div class="popular-tags" th:if="${popularTags != null and !popularTags.empty}">
                <strong>Популярные теги:</strong>
                <a th:each="tag : ${popularTags}" th:href="@{/search?tag={name}(name=${tag.name})}" 
                   class="tag" th:text="${tag.name}"></a>
            </div>
        </div>

        <div th:if="${currentTag != null}" class="search-title">
            <h2>📸 Результаты поиска по тегу: <strong style="color: #3498db;" th:text="${currentTag}"></strong></h2>
        </div>

        <div th:if="${photos != null and !photos.empty}" class="photo-grid">
            <div th:each="photo : ${photos}" class="photo-card">
                <img th:src="@{${photo.imagePath}}" alt="Photo">
                <div class="photo-info">
                    <h4 th:text="${photo.title}">Название</h4>
                    <p th:text="${photo.description}">Описание</p>
                    <p>⭐ Рейтинг: <span th:text="${photo.rating}">0</span></p>
                    <a th:href="@{/photos/{id}(id=${photo.id})}" class="btn">💬 Открыть</a>
                </div>
            </div>
        </div>

        <div th:if="${photos == null or photos.empty and currentTag != null}" class="empty">
            <p>📷 Нет фотографий с тегом <strong th:text="${currentTag}"></strong></p>
            <p>Попробуйте другой тег или <a href="/photos/gallery">загрузите новое фото</a></p>
        </div>

        <div th:if="${currentTag == null}" class="empty">
            <p>🔍 Введите тег для поиска или выберите из популярных выше</p>
        </div>
    </div>
</body>
</html>
