<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поиск - Фотоальбом</title>
    <style>
        body {
            font-family: 'Century Gothic', 'Times New Roman', serif;
            margin: 0;
            padding: 20px;
            background: #f3f4f6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
        }
        .search-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .search-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            font-family: 'Century Gothic', 'Times New Roman', serif;
        }
        .tab-btn.active {
            color: #3498db;
            border-bottom: 2px solid #3498db;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .search-form input, .search-form select {
            width: 70%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Century Gothic', 'Times New Roman', serif;
        }
        .search-form button {
            padding: 12px 24px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Century Gothic', 'Times New Roman', serif;
        }
        .search-form button:hover {
            background: #2980b9;
        }
        .date-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .date-inputs input {
            width: auto;
            flex: 1;
        }
        .popular-tags {
            margin-top: 15px;
        }
        .tag {
            display: inline-block;
            background: #e0e0e0;
            padding: 6px 14px;
            margin: 5px;
            border-radius: 20px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }
        .tag:hover {
            background: #3498db;
            color: white;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .photo-info {
            padding: 12px;
        }
        .photo-info h4 {
            margin: 0 0 5px 0;
        }
        .photo-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            padding: 6px 12px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 12px;
        }
        .empty {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 12px;
        }
        .search-title {
            margin-bottom: 20px;
            color: #333;
        }
        .search-meta {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .author-link {
            color: #3498db;
            text-decoration: none;
        }
        .author-link:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-pane').forEach(pane => {
                pane.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
            document.querySelector('.tab-btn[onclick="showTab(\'' + tabId + '\')"]').classList.add('active');
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Поиск фотографий</h1>
            <div class="nav">
                <a href="/">Главная</a>
                <a href="/albums">Мои альбомы</a>
                <a href="/photos/gallery">Галерея</a>
                <a href="/search">Поиск</a>
                <a href="/friends">Друзья</a>
                <a href="/logout">Выйти</a>
            </div>
        </div>

        <div class="search-box">
            <div class="search-tabs">
                <button class="tab-btn active" onclick="showTab('tag')">По тегу</button>
                <button class="tab-btn" onclick="showTab('date')">По дате</button>
                <button class="tab-btn" onclick="showTab('author')">По автору</button>
            </div>

            <div id="tag" class="tab-pane active">
                <form class="search-form" method="get" action="/search">
                    <input type="hidden" name="type" value="tag">
                    <input type="text" name="query" placeholder="Введите тег..." th:value="${param.query}">
                    <button type="submit">Найти</button>
                </form>
                <div class="popular-tags" th:if="${popularTags != null and !popularTags.empty}">
                    <strong>Популярные теги:</strong>
                    <a th:each="tag : ${popularTags}" th:href="@{/search?type=tag&amp;query={name}(name=${tag.name})}" 
                       class="tag" th:text="${tag.name}"></a>
                </div>
            </div>

            <div id="date" class="tab-pane">
                <form class="search-form" method="get" action="/search">
                    <input type="hidden" name="type" value="date">
                    <div class="date-inputs">
                        <input type="date" name="from" placeholder="С даты" th:value="${param.from}">
                        <span>—</span>
                        <input type="date" name="to" placeholder="По дату" th:value="${param.to}">
                    </div>
                    <button type="submit">Найти</button>
                </form>
            </div>

            <div id="author" class="tab-pane">
                <form class="search-form" method="get" action="/search">
                    <input type="hidden" name="type" value="author">
                    <input type="text" name="query" placeholder="Имя пользователя..." th:value="${param.query}">
                    <button type="submit">Найти</button>
                </form>
            </div>
        </div>

        <div th:if="${searchType != null}" class="search-title">
            <h2 th:if="${searchType == 'tag'}" th:text="'Результаты поиска по тегу: ' + ${query}"></h2>
            <h2 th:if="${searchType == 'author'}" th:text="'Фото пользователя: ' + ${query}"></h2>
            <h2 th:if="${searchType == 'date' and fromDate != null and toDate != null}" 
                th:text="'Фото за период: ' + ${fromDate} + ' — ' + ${toDate}"></h2>
            <div th:if="${photos != null}" class="search-meta">Найдено: <span th:text="${photos.size()}"></span> фото</div>
        </div>

        <div th:if="${photos != null and !photos.empty}" class="photo-grid">
            <div th:each="photo : ${photos}" class="photo-card">
                <img th:src="@{${photo.imagePath}}" alt="Photo">
                <div class="photo-info">
                    <h4 th:text="${photo.title}">Название</h4>
                    <p th:text="${photo.description}">Описание</p>
                    <p>Автор: <a th:href="@{/search?type=author&amp;query={username}(username=${photo.Username})}" 
                           class="author-link" th:text="${photo.Username}"></a></p>
                    <p>Дата: <span th:text="${photo.createdAt}"></span></p>
                    <p>Рейтинг: <span th:text="${photo.rating}">0</span></p>
                    <a th:href="@{/photos/{id}(id=${photo.id})}" class="btn">Открыть</a>
                </div>
            </div>
        </div>

        <div th:if="${photos != null and photos.empty}" class="empty">
            <p>Ничего не найдено</p>
            <p>Попробуйте изменить параметры поиска или <a href="/photos/gallery">загрузите новое фото</a></p>
        </div>

        <div th:if="${photos == null and searchType == null}" class="empty">
            <p>Выберите тип поиска и введите запрос</p>
        </div>
    </div>
</body>
</html>
