<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пользователи</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
            padding:30px;
        }

        .user{
            background:white;
            padding:20px;
            border-radius:12px;
            margin-bottom:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        button{
            padding:8px 14px;
            background:#16a34a;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

    </style>
</head>
<body>

<h1>Пользователи</h1>

<div class="user">
    <h3>ivanov</h3>

    <button>
        Добавить в друзья
    </button>
</div>

<div class="user">
    <h3>petrov</h3>

    <button>
        Добавить в друзья
    </button>
</div>

</body>
</html>
