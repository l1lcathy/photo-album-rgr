<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Photo Gallery</title>
</head>

<body>

<h1>Photo Gallery</h1>

<form method="post" action="/photos/upload" enctype="multipart/form-data">
    <input type="file" name="file">
    <button type="submit">Upload</button>
</form>

<hr>

<div th:each="photo : ${photos}">
    <div>
        <h4 th:text="${photo.title}">Название</h4>
        <img th:src="@{${photo.imagePath}}" alt="Photo" style="max-width: 300px;">
        <p th:text="${photo.description}">Описание</p>
    </div>
    <hr>
</div>

<div th:if="${photos == null or photos.empty}">
    <p>Нет фотографий. Загрузите первую!</p>
</div>

<br>
<a href="/">На главную</a>

</body>
</html>
