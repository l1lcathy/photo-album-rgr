<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Галерея - Фотоальбом</title>
    <style>
        body {
            font-family: 'Century Gothic', 'Times New Roman', serif;
            margin: 0;
            padding: 20px;
            background: #f3f4f6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
        }
        .nav a:hover {
            background: #34495e;
            border-radius: 5px;
        }
        .upload-form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .photo-info {
            padding: 10px;
        }
        .btn {
            background: #3498db;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            display: inline-block;
            margin: 2px;
            font-family: 'Century Gothic', 'Times New Roman', serif;
        }
        .btn-delete {
            background: #e74c3c;
        }
        .btn-upload {
            background: #27ae60;
        }
        .empty {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Галерея</h1>
            <div class="nav">
                <a href="/">Главная</a>
                <a href="/albums">Мои альбомы</a>
                <a href="/photos/gallery">Галерея</a>
                <a href="/search">Поиск</a>
                <a href="/friends">Друзья</a>
                <a href="/admin">Админ панель</a>
                <a href="/logout">Выйти</a>
            </div>
        </div>

        <div class="upload-form">
            <h3>Загрузить новое фото</h3>
            <form method="post" action="/photos/upload" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <button type="submit" class="btn btn-upload">Загрузить</button>
            </form>
        </div>

        <div th:if="${photos != null and !photos.empty}" class="photo-grid">
            <div th:each="photo : ${photos}" class="photo-card">
                <img th:src="@{${photo.imagePath}}" alt="Photo">
                <div class="photo-info">
                    <h4 th:text="${photo.title}">Название</h4>
                    <p th:text="${photo.description}">Описание</p>
                    <p>Рейтинг: <span th:text="${photo.rating}">0</span></p>
                    <a th:href="@{/photos/{id}(id=${photo.id})}" class="btn">Комментарии</a>
                    <form method="post" th:action="@{/photos/delete/{id}(id=${photo.id})}" style="display: inline;">
                        <button type="submit" class="btn btn-delete" onclick="return confirm('Удалить фото?')">Удалить</button>
                    </form>
                </div>
            </div>
        </div>

        <div th:if="${photos == null or photos.empty}" class="empty">
            <p>Нет загруженных фотографий.</p>
            <p>Загрузите первое фото через форму выше!</p>
        </div>
    </div>
</body>
</html>
