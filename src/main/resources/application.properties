spring.application.name=photoalbum

spring.datasource.url=jdbc:postgresql://localhost:5432/photoalbum_db
spring.datasource.username=postgres
spring.datasource.password=katty

spring.datasource.driver-class-name=org.postgresql.Driver

spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

spring.mail.host=smtp.yandex.ru
spring.mail.port=587
spring.mail.username="put_mail_here"
spring.mail.password="password_mail"
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.from="put_mail_here"